name: Deck Cushion Rain Alert

on:
  schedule:
    # Every 3 hours, 3 AM–9 PM ET (EDT = UTC-4)
    - cron: '0 7  * * *'  #  3 AM ET
    - cron: '0 10 * * *'  #  6 AM ET
    - cron: '0 13 * * *'  #  9 AM ET
    - cron: '0 16 * * *'  # 12 PM ET
    - cron: '0 19 * * *'  #  3 PM ET
    - cron: '0 22 * * *'  #  6 PM ET
    - cron: '0 1  * * *'  #  9 PM ET
  workflow_dispatch:  # allows manual trigger from GitHub UI for testing

jobs:
  check-rain:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit state.json back to repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run rain check
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_PRIMARY_EMAIL: ${{ secrets.ALERT_PRIMARY_EMAIL }}
          ALERT_SECONDARY_EMAIL: ${{ secrets.ALERT_SECONDARY_EMAIL }}
        run: python3 weather_check.py

      - name: Commit updated state
        run: |
          git config user.name "cushion-alert-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git pull --rebase origin main
          git push
